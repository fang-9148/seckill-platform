server:
  port: 9090

spring:
  application:
    name: seckill-admin
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/seckill?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: admin123456
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
      password: admin123456
      database: 1

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.seckill: DEBUG
