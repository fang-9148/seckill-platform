server:
  port: 9091
  tomcat:
    threads:
      max: 200        # 最大线程数
      min-spare: 20   # 最小空闲线程
    accept-count: 500 # 最大等待队列
    connection-timeout: 3000ms

spring:
  application:
    name: seckill-core
  profiles:
    active: dev

  # ---- 数据源 ----
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/seckill?useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: root
    password: admin123456

  # ---- Redis 配置 ----
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
      password: admin123456
      database: 1

  # ---- RabbitMQ 配置 ----
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10       # 每次拉取消息数
        concurrency: 5     # 消费者线程数
        max-concurrency: 10
    publisher-confirm-type: correlated
    publisher-returns: true

# ---- MyBatis-Plus 配置 ----
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.seckill.core.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ---- Knife4j API 文档 ----
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ---- 日志 ----
logging:
  level:
    root: INFO
    com.seckill: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
